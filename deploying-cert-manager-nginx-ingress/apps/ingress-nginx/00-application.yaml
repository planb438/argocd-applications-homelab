apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    targetRevision: "4.11.3"  # <-- SPECIFIC VERSION
    chart: ingress-nginx
    helm:
      values: |
        controller:
          hostNetwork: true
          service:
            type: ClusterIP
          admissionWebhooks:
            enabled: false
          publishService:
            enabled: true
          replicaCount: 2
          nodeSelector:
            kubernetes.io/os: linux
        defaultBackend:
          nodeSelector:
            kubernetes.io/os: linux
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
