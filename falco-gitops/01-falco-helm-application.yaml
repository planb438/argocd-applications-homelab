apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    targetRevision: "*"  # Use latest stable
    chart: falco
    helm:
      values: |
        # ============================================
        # MODERN EBPF - Uses modern_ebpf driver
        # ============================================
        driver:
          kind: modern_ebpf
          enabled: true
        
        # ============================================
        # Falco Configuration
        # ============================================
        falco:
          jsonOutput: true
          logLevel: info
          priority: warning
          stdoutOutput:
            enabled: true
          fileOutput:
            enabled: true
            keepAlive: false
            filename: "/var/log/falco_events.log"
        
        # ============================================
        # Resources (t3.medium optimized)
        # ============================================
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        
        # ============================================
        # Disable webhook and exporter
        # ============================================
        webhook:
          enabled: false
        falco-exporter:
          enabled: false
        
        # ============================================
        # DaemonSet configuration
        # ============================================
        daemonset:
          updateStrategy:
            type: RollingUpdate
        
        # ============================================
        # Tolerations to run on all nodes
        # ============================================
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
          - key: node-role.kubernetes.io/master
            effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true