# 02-falco-values.yaml
# This is a standalone values file for reference
# The actual values are in the helm.values block above

global:
  registry: docker.io
  repository: falcosecurity/falco
  tag: latest
  pullPolicy: IfNotPresent

driver:
  enabled: true
  kind: ebpf
  ebpf:
    enabled: true
    probePath: "/root/.falco/falco-bpf.o"

falco:
  jsonOutput: true
  jsonIncludeOutputProperty: true
  logLevel: info
  priority: warning
  rulesFile:
    - /etc/falco/falco_rules.yaml
    - /etc/falco/falco_rules.local.yaml
    - /etc/falco/k8s_audit_rules.yaml
    - /etc/falco/rules.d/
  k8sAuditEndpoint: "0.0.0.0:9765"
  k8sAuditRules:
    - /etc/falco/k8s_audit_rules.yaml
  stdoutOutput:
    enabled: true
  fileOutput:
    enabled: true
    keepAlive: false
    filename: "/var/log/falco_events.log"
  webhook:
    enabled: true
    address: 0.0.0.0
    port: 2801
    url: "http://falco-webhook.falco-system.svc.cluster.local:2801/"

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

daemonset:
  updateStrategy:
    type: RollingUpdate

nodeSelector: {}
tolerations:
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    effect: NoSchedule

falco-exporter:
  enabled: true
  image:
    repository: falcosecurity/falco-exporter
    tag: latest
  service:
    port: 9376
    type: ClusterIP
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

customRules:
  falco_rules.local.yaml: |
    - rule: Terminal shell in container
      desc: A shell was used as the entrypoint/exec point into a container
      condition: >
        container.id != host and
        proc.name in (bash, sh, zsh, dash)
      output: >
        Shell run in container (user=%user.name command=%proc.cmdline
        container_id=%container.id container_name=%container.name
        image=%container.image.repository:%container.image.tag)
      priority: WARNING
      tags: [container, shell, mitre_execution]