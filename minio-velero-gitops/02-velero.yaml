apiVersion: v1
kind: ServiceAccount
metadata:
  name: velero
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: velero-server
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: velero
    namespace: velero
---
apiVersion: v1
kind: Secret
metadata:
  name: cloud-credentials
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "4"
type: Opaque
stringData:
  cloud: |
    [default]
    aws_access_key_id=minioadmin
    aws_secret_access_key=minioadmin123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velero
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: velero
  template:
    metadata:
      labels:
        app: velero
    spec:
      serviceAccountName: velero
      initContainers:
        - name: velero-plugin-for-aws
          image: velero/velero-plugin-for-aws:v1.9.0
          volumeMounts:
            - name: plugins
              mountPath: /target
      containers:
        - name: velero
          image: velero/velero:v1.13.0
          command:
            - /velero
          args:
            - server
          env:
            - name: VELERO_SCRAPE_INTERVAL
              value: "30s"
            - name: VELERO_METRICS_PORT
              value: "8085"
          volumeMounts:
            - name: plugins
              mountPath: /plugins
            - name: scratch
              mountPath: /scratch
            - name: cloud-credentials
              mountPath: /credentials
          ports:
            - containerPort: 8085
              name: metrics
      volumes:
        - name: plugins
          emptyDir: {}
        - name: scratch
          emptyDir: {}
        - name: cloud-credentials
          secret:
            secretName: cloud-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: velero
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  selector:
    app: velero
  ports:
    - port: 8085
      targetPort: metrics
      name: metrics