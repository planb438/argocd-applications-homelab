apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-critical
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  schedule: "0 3 * * *"
  template:
    includedNamespaces:
      - argocd
      - monitoring
      - wordpress
      - velero
    ttl: 720h0m0s
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: weekly-full
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  schedule: "0 2 * * 0"
  template:
    includedNamespaces:
      - "*"
    ttl: 168h0m0s
