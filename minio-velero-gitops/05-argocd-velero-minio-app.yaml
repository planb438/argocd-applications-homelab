apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero-minio
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOURUSER/YOURREPO.git
    targetRevision: main
    path: velero-minio
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true