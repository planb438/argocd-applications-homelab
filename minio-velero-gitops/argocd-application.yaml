apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio-velero
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vmware-tanzu/velero.git
    targetRevision: v1.13.0
    path: config/crd/v1/bases
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
